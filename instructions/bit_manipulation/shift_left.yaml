name: SHIFT_LEFT
category: BitManipulation
format: R

description: |
Logical left shift.

operands:

* name: rd
  type: GPR
  description: Destination register
* name: rs1
  type: GPR
  description: Value to shift
* name: rs2
  type: GPR
  description: Shift amount

encoding:
opcode: 0x33
fields:
rd: [11, 7]
rs1: [19, 15]
rs2: [24, 20]

semantics: |
shift = rs2 % XLEN
rd = rs1 << shift

flags:

* ZERO
* CARRY (optional)

security:

* constant_time

exceptions:

* INVALID_SHIFT (optional)
