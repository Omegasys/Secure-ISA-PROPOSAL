name: ENTER_SECURE
category: System
format: S

description: |
Enters a secure execution mode (isolated enclave-like context).

operands:

* name: secure_cap
  type: CR
  description: Capability defining secure region

encoding:
opcode: 0xA1
fields:
secure_cap: [19, 15]

semantics: |
assert(secure_cap.perm includes EXECUTE)
assert(secure_cap.tag == VALID)

ENTER_SECURE_MODE(secure_cap)

security:

* isolation_enforced
* capability_required

side_effects:

* changes_execution_domain

exceptions:

* CAPABILITY_VIOLATION
* INVALID_SECURE_REGION
