name: LOAD
category: DataTransfer
format: I

description: |
Load data from memory into a general-purpose register using a capability-checked address.

operands:

* name: rd
  type: GPR
  description: Destination register
* name: rs1
  type: CR
  description: Capability register providing base and bounds
* name: offset
  type: immediate
  description: Signed offset from capability base

encoding:
opcode: 0x01
fields:
rd: [11, 7]
rs1: [19, 15]
offset: [31, 20]

semantics: |
addr = rs1.base + offset
assert(addr within rs1.bounds)
assert(rs1.perm includes READ)

rd = MEM[addr]

security:

* capability_check
* bounds_check
* permission_check

exceptions:

* CAPABILITY_VIOLATION
* ACCESS_FAULT
* MISALIGNED_ACCESS
