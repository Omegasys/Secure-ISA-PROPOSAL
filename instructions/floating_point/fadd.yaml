name: FADD
category: FloatingPoint
format: R

description: |
Floating-point addition of two scalar registers.

operands:

* name: fd
  type: FPR
  description: Destination floating-point register
* name: fs1
  type: FPR
  description: First operand
* name: fs2
  type: FPR
  description: Second operand

encoding:
opcode: 0x60
fields:
fd: [11, 7]
fs1: [19, 15]
fs2: [24, 20]

semantics: |
fd = fs1 + fs2

floating_point_rules:
rounding_mode: dynamic_or_default
precision: IEEE-compatible (configurable)

flags:

* FP_ZERO
* FP_NEGATIVE
* FP_INEXACT

security:

* constant_time (optional, implementation dependent)

exceptions:

* FLOATING_POINT_EXCEPTION
