name: FDIV
category: FloatingPoint
format: R

description: |
Floating-point division.

operands:

* name: fd
  type: FPR
  description: Destination register
* name: fs1
  type: FPR
  description: Dividend
* name: fs2
  type: FPR
  description: Divisor

encoding:
opcode: 0x63
fields:
fd: [11, 7]
fs1: [19, 15]
fs2: [24, 20]

semantics: |
assert(fs2 != 0.0)
fd = fs1 / fs2

floating_point_rules:
rounding_mode: dynamic_or_default

flags:

* FP_ZERO
* FP_NEGATIVE
* FP_INEXACT

security:

* constant_time (NOT guaranteed unless CT mode enabled)

exceptions:

* DIVIDE_BY_ZERO
* FLOATING_POINT_EXCEPTION
